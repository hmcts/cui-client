name: Node.js Package

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Determine npm dist-tag from GitHub Release
        if: github.event_name == 'release'
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "NPM_TAG=next" >> "$GITHUB_ENV"
          else
            echo "NPM_TAG=latest" >> "$GITHUB_ENV"
          fi

      - name: Default npm dist-tag for manual runs
        if: github.event_name != 'release'
        run: echo "NPM_TAG=latest" >> "$GITHUB_ENV"

      - name: Publish package (OIDC via npm)
        run: |
          unset NODE_AUTH_TOKEN
          export NPM_CONFIG_USERCONFIG="$RUNNER_TEMP/npmrc-noauth"
          printf "registry=https://registry.npmjs.org/\n" > "$NPM_CONFIG_USERCONFIG"
          npm config delete //registry.npmjs.org/:_authToken || true
          npm config delete _authToken || true
          npm publish --provenance --access public --tag "$NPM_TAG"
